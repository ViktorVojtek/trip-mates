services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tripmates
      POSTGRES_PASSWORD: tripmates
      POSTGRES_DB: tripmates
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmates"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://tripmates:tripmates@db:5432/tripmates
      JWT_SECRET: change-me-in-production
      CLIENT_ORIGIN: http://localhost:8080
      NODE_ENV: production
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  pgdata:
